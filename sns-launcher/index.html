<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Quick Launcher</title>
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="複数のSNSアカウントをワンクリックで開けるランチャーアプリ">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SNS Launcher">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .accounts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .group-section {
            margin-bottom: 20px;
        }

        .group-title {
            color: white;
            font-size: 13px;
            font-weight: 600;
            opacity: 0.85;
            margin-bottom: 10px;
            padding-left: 2px;
        }
        
        .account-btn {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .account-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        .account-btn:active {
            transform: translateY(-2px);
        }
        
        .account-btn .icon {
            font-size: 24px;
        }
        
        .account-btn-desc {
            font-size: 10px;
            color: #999;
            font-weight: 400;
            text-align: center;
            line-height: 1.3;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .btn-edit {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
        }
        
        .btn-edit:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .btn-add {
            background: white;
            color: #667eea;
            font-weight: 600;
        }
        
        .btn-add:hover {
            background: #f0f0f0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #666;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn-secondary {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        
        .btn-primary {
            flex: 1;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .account-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 12px;
        }
        
        .account-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        
        .account-item-info {
            flex: 1;
        }
        
        .account-item-platform {
            font-weight: 600;
            color: #333;
        }
        
        .account-item-url {
            font-size: 11px;
            color: #999;
            word-break: break-all;
        }
        
        .account-item-desc {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #e0e0e0;
            line-height: 1.4;
        }
        
        .btn-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .btn-delete:hover {
            background: #ff5252;
        }
        
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 13px;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 9999;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .update-banner {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translate(-50%, 10px);
            display: flex;
            align-items: center;
            gap: 12px;
            background: #333;
            color: white;
            padding: 10px 12px 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .update-banner.show {
            opacity: 1;
            transform: translate(-50%, 0);
            pointer-events: auto;
        }

        .update-banner button {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .accounts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 SNS Quick Launcher</h1>
            <p>ワンクリックでSNSを開く</p>
        </div>
        
        <div id="accountsContainer"></div>

        <div class="button-group">
            <button class="btn btn-edit" onclick="openEditModal()">⚙️ 編集</button>
            <button class="btn btn-add" onclick="openAddModal()">+ 追加</button>
        </div>
    </div>
    
    <!-- 追加モーダル -->
    <div class="modal" id="addModal" onclick="if(event.target.id==='addModal')closeAddModal()">
        <div class="modal-content">
            <div class="modal-header">アカウント追加</div>
            
            <div class="form-group">
                <label>プラットフォーム</label>
                <select id="platformSelect">
                    <option value="">選択してください</option>
                    <option value="threads">Threads</option>
                    <option value="x">X (Twitter)</option>
                    <option value="substack">Substack</option>
                    <option value="instagram">Instagram</option>
                    <option value="tiktok">TikTok</option>
                    <option value="youtube">YouTube</option>
                    <option value="bluesky">Bluesky</option>
                    <option value="note">note</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>URL または ユーザー名</label>
                <input type="text" id="usernameInput" placeholder="例: @username または https://...">
            </div>
            
            <div class="form-group">
                <label>表示名</label>
                <input type="text" id="displayNameInput" placeholder="例: メインアカウント">
            </div>
            
            <div class="form-group">
                <label>説明</label>
                <textarea id="descriptionInput" placeholder="例: SNS戦略用、プライベート用など" style="resize: vertical; height: 60px;"></textarea>
            </div>

            <div class="form-group">
                <label>グループ</label>
                <input type="text" id="groupInput" list="groupOptions" placeholder="例: 仕事用、プライベート用など（空欄可）">
                <datalist id="groupOptions"></datalist>
            </div>

            <div class="form-actions">
                <button class="btn-secondary" onclick="closeAddModal()">キャンセル</button>
                <button class="btn-primary" onclick="addAccount()">追加</button>
            </div>
        </div>
    </div>
    
    <!-- 編集モーダル -->
    <div class="modal" id="editModal" onclick="if(event.target.id==='editModal')closeEditModal()">
        <div class="modal-content">
            <div class="modal-header">アカウント管理</div>
            <div id="accountsList" class="account-list"></div>
            <div class="form-actions">
                <button class="btn-secondary" onclick="closeEditModal()" style="flex: 1;">閉じる</button>
            </div>
        </div>
    </div>

    <!-- 更新通知バナー -->
    <div class="update-banner" id="updateBanner">
        <span>新しいバージョンがあります</span>
        <button id="updateBannerBtn" type="button">更新</button>
    </div>

    <script>
        const PLATFORMS = {
            threads: {
                name: 'Threads',
                icon: '𝕿',
                urlPattern: (u) => `https://www.threads.net/@${u.replace('@', '')}`
            },
            x: {
                name: 'X',
                icon: '𝕏',
                urlPattern: (u) => `https://x.com/${u.replace('@', '')}`
            },
            substack: {
                name: 'Substack',
                icon: '📬',
                urlPattern: (u) => `https://substack.com/@${u.replace('@', '')}`
            },
            instagram: {
                name: 'Instagram',
                icon: '📷',
                urlPattern: (u) => `https://instagram.com/${u.replace('@', '')}`
            },
            tiktok: {
                name: 'TikTok',
                icon: '🎵',
                urlPattern: (u) => `https://www.tiktok.com/@${u.replace('@', '')}`
            },
            youtube: {
                name: 'YouTube',
                icon: '▶️',
                urlPattern: (u) => `https://www.youtube.com/@${u.replace('@', '')}`
            },
            bluesky: {
                name: 'Bluesky',
                icon: '🌐',
                urlPattern: (u) => `https://bsky.app/profile/${u.replace('@', '')}`
            },
            note: {
                name: 'note',
                icon: '📝',
                urlPattern: (u) => `https://note.com/${u.replace('@', '')}`
            }
        };

        function loadAccounts() {
            const saved = localStorage.getItem('snsAccounts');
            return saved ? JSON.parse(saved) : [
                { id: 1, platform: 'threads', url: 'https://www.threads.net/@doragon', displayName: 'Threads', description: '', group: '' },
                { id: 2, platform: 'x', url: 'https://x.com/doragon', displayName: 'X', description: '', group: '' },
                { id: 3, platform: 'substack', url: 'https://substack.com/@doragon', displayName: 'Substack', description: '', group: '' }
            ];
        }

        function groupAccounts(accounts) {
            const groups = new Map();
            accounts.forEach((acc) => {
                const key = (acc.group || '').trim();
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(acc);
            });
            // 無所属（空グループ）を最後に、それ以外は登場順
            const entries = [...groups.entries()];
            entries.sort((a, b) => {
                if (a[0] === '' && b[0] !== '') return 1;
                if (a[0] !== '' && b[0] === '') return -1;
                return 0;
            });
            return entries;
        }

        function saveAccounts(accounts) {
            localStorage.setItem('snsAccounts', JSON.stringify(accounts));
            renderAccounts();
            showNotification('保存しました');
        }

        function showNotification(text) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.animation = 'slideUp 0.3s ease reverse';
                setTimeout(() => notif.remove(), 300);
            }, 2000);
        }

        function renderAccounts() {
            const accounts = loadAccounts();
            const container = document.getElementById('accountsContainer');

            if (accounts.length === 0) {
                container.innerHTML = '<div class="empty-state">アカウントを追加してください</div>';
                return;
            }

            const grouped = groupAccounts(accounts);
            container.innerHTML = grouped.map(([groupName, accs]) => {
                const grid = accs.map(acc => {
                    const platform = PLATFORMS[acc.platform];
                    const tooltip = acc.description ? `${acc.displayName}: ${acc.description}` : acc.displayName;
                    return `
                        <button class="account-btn" onclick="openAccount('${acc.url.replace(/'/g, "\\'")}')" title="${tooltip.replace(/"/g, '&quot;')}">
                            <div class="icon">${platform.icon}</div>
                            <div>${acc.displayName}</div>
                            ${acc.description ? `<div class="account-btn-desc">${acc.description}</div>` : ''}
                        </button>
                    `;
                }).join('');
                const title = groupName ? groupName : (grouped.length > 1 ? 'その他' : '');
                return `
                    <div class="group-section">
                        ${title ? `<div class="group-title">${title}</div>` : ''}
                        <div class="accounts-grid">${grid}</div>
                    </div>
                `;
            }).join('');
        }

        function openAccount(url) {
            // window.open('_blank') だと新規タブ経由での引き渡しになり、
            // Android のアプリリンク（Threads等のネイティブアプリへの
            // ハンドオフ）と競合して遷移中の画面が重なって見えることがある。
            // 同じウィンドウで直接遷移させることでOSに素直に引き渡す。
            window.location.href = url;
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('platformSelect').value = '';
            document.getElementById('usernameInput').value = '';
            document.getElementById('displayNameInput').value = '';
            document.getElementById('descriptionInput').value = '';
            document.getElementById('groupInput').value = '';

            const groupOptions = document.getElementById('groupOptions');
            const groups = [...new Set(loadAccounts().map(a => (a.group || '').trim()).filter(Boolean))];
            groupOptions.innerHTML = groups.map(g => `<option value="${g.replace(/"/g, '&quot;')}">`).join('');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
        }

        function openEditModal() {
            document.getElementById('editModal').classList.add('active');
            renderAccountsList();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function renderAccountsList() {
            const accounts = loadAccounts();
            const list = document.getElementById('accountsList');

            if (accounts.length === 0) {
                list.innerHTML = '<div class="empty-state">アカウントがありません</div>';
                return;
            }

            const grouped = groupAccounts(accounts);
            list.innerHTML = grouped.map(([groupName, accs]) => {
                const items = accs.map(acc => {
                    const platform = PLATFORMS[acc.platform];
                    return `
                        <div class="account-item">
                            <div class="account-item-info">
                                <div class="account-item-platform">${platform.name} - ${acc.displayName}</div>
                                <div class="account-item-url">${acc.url}</div>
                                ${acc.description ? `<div class="account-item-desc">📝 ${acc.description}</div>` : ''}
                            </div>
                            <button class="btn-delete" onclick="deleteAccount(${acc.id})">削除</button>
                        </div>
                    `;
                }).join('');
                const title = groupName ? groupName : (grouped.length > 1 ? 'その他' : '');
                return `${title ? `<div class="group-title" style="color:#666;">${title}</div>` : ''}${items}`;
            }).join('');
        }

        function addAccount() {
            const platform = document.getElementById('platformSelect').value;
            let input = document.getElementById('usernameInput').value.trim();
            const displayName = document.getElementById('displayNameInput').value.trim() || PLATFORMS[platform].name;
            const description = document.getElementById('descriptionInput').value.trim();
            const group = document.getElementById('groupInput').value.trim();

            if (!platform || !input) {
                alert('プラットフォームとURLを入力してください');
                return;
            }

            let urlToSave;
            if (input.startsWith('http://') || input.startsWith('https://')) {
                urlToSave = input;
            } else {
                urlToSave = PLATFORMS[platform].urlPattern(input);
            }

            const accounts = loadAccounts();
            const newAccount = {
                id: Math.max(...accounts.map(a => a.id), 0) + 1,
                platform,
                url: urlToSave,
                displayName,
                description,
                group
            };

            accounts.push(newAccount);
            saveAccounts(accounts);
            closeAddModal();
        }

        function deleteAccount(id) {
            if (!confirm('削除しますか？')) return;
            let accounts = loadAccounts();
            accounts = accounts.filter(a => a.id !== id);
            saveAccounts(accounts);
            renderAccountsList();
        }

        // 初期化
        renderAccounts();

        // Service Worker登録（オフライン対応）
        if ('serviceWorker' in navigator) {
            // 既に別のワーカーに制御されているページでのみ「更新」を通知する。
            // （初回インストール時の claim() でも controllerchange は発火するため、
            //   それを新バージョン通知と誤認しないようにするガード）
            const hadControllerAtLoad = !!navigator.serviceWorker.controller;

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then((reg) => {
                    reg.update().catch(() => {});
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') reg.update().catch(() => {});
                    });
                }).catch(() => {
                    // 登録失敗時は通常のWebアプリとして動作
                });
            });

            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!hadControllerAtLoad) return;
                document.getElementById('updateBanner')?.classList.add('show');
            });

            document.getElementById('updateBannerBtn')?.addEventListener('click', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
