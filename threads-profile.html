<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threads Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #101010;
      color: #f3f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 620px;
      padding: 0 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #1e1e1e;
    }

    .header-logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header-icon {
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    /* Profile Section */
    .profile-section {
      padding: 20px 0 16px;
    }

    .profile-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .profile-handle {
      font-size: 15px;
      color: #a8a8a8;
      margin-bottom: 12px;
    }

    .profile-bio {
      font-size: 15px;
      line-height: 1.5;
      color: #f3f5f7;
      max-width: 340px;
    }

    .profile-avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background-color: #f5e6d3;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2.5px solid #2a2a2a;
    }

    .profile-avatar svg {
      width: 80px;
      height: 80px;
    }

    .profile-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 14px;
      color: #a8a8a8;
    }

    .profile-stats .dot {
      width: 3px;
      height: 3px;
      background-color: #a8a8a8;
      border-radius: 50%;
    }

    .follower-avatars {
      display: flex;
    }

    .follower-avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background-color: #444;
      border: 1.5px solid #101010;
      margin-right: -6px;
    }

    .follower-avatar:nth-child(1) { background-color: #c0392b; }
    .follower-avatar:nth-child(2) { background-color: #8e44ad; }
    .follower-avatar:nth-child(3) { background-color: #2980b9; }

    .profile-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      border: 1px solid #333;
      background: transparent;
      color: #f3f5f7;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #1e1e1e;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      margin-top: 4px;
    }

    .tab {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      color: #a8a8a8;
      cursor: pointer;
      border-bottom: 1.5px solid transparent;
      transition: color 0.15s;
    }

    .tab.active {
      color: #f3f5f7;
      border-bottom-color: #f3f5f7;
    }

    /* Posts */
    .post {
      padding: 16px 0;
      border-bottom: 1px solid #1e1e1e;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #f5e6d3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .post-avatar svg {
      width: 32px;
      height: 32px;
    }

    .post-meta {
      flex: 1;
    }

    .post-username {
      font-size: 14px;
      font-weight: 600;
    }

    .post-time {
      font-size: 13px;
      color: #a8a8a8;
    }

    .post-more {
      color: #a8a8a8;
      font-size: 20px;
      cursor: pointer;
    }

    .post-content {
      font-size: 15px;
      line-height: 1.6;
      padding-left: 46px;
      margin-bottom: 12px;
    }

    .post-actions {
      display: flex;
      gap: 16px;
      padding-left: 46px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #a8a8a8;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .action-btn svg {
      width: 20px;
      height: 20px;
    }

    .action-btn:hover {
      color: #f3f5f7;
    }

    /* Dragon SVG colors */
    .dragon-body { fill: #c0392b; }
    .circle-bg { fill: #f5e6d3; }
    .circle-border { fill: none; stroke: #1e2a3a; stroke-width: 5; }
  </style>
</head>
